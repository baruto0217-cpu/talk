<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>救急振り返りルーム</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  /* ===== リセット & 変数 ===== */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #f5f4f0;
    --surface:  #ffffff;
    --surface2: #f0efe9;
    --border:   rgba(0,0,0,0.10);
    --border2:  rgba(0,0,0,0.18);
    --text:     #1a1a18;
    --text2:    #5a5a56;
    --text3:    #9a9a94;
    --teal:     #0f6e56;
    --teal-bg:  #e1f5ee;
    --teal-bd:  #5dcaa5;
    --coral:    #993c1d;
    --coral-bg: #faece7;
    --coral-bd: #f0997b;
    --blue:     #185fa5;
    --blue-bg:  #e6f1fb;
    --blue-bd:  #85b7eb;
    --amber:    #854f0b;
    --amber-bg: #faeeda;
    --purple:   #534ab7;
    --purple-bg:#eeedfe;
    --red:      #a32d2d;
    --red-bg:   #fcebeb;
    --radius:   10px;
    --radius-sm:6px;
  }

  html, body { height: 100%; font-family: 'Hiragino Koshi Gothic Pro', 'ヒラギノ角ゴ Pro', 'Yu Gothic', 'YuGothic', 'Meiryo', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; }

  /* ===== ユーティリティ ===== */
  .hidden { display: none !important; }
  button { cursor: pointer; font-family: inherit; }

  /* ===== 画面管理 ===== */
  .screen { display: none; }
  .screen.active { display: flex; }

  /* =====================
     ログイン画面
  ===================== */
  #screen-login {
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    background: var(--bg);
  }
  .login-card {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 2.2rem 2rem;
    width: 100%;
    max-width: 380px;
  }
  .login-logo {
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }
  .login-sub {
    font-size: 12px;
    color: var(--text3);
    margin-bottom: 1.8rem;
  }
  .login-step { display: flex; flex-direction: column; gap: 14px; }
  .login-step.hidden { display: none; }
  .field-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 5px;
  }
  .field-input {
    width: 100%;
    font-size: 14px;
    padding: 10px 12px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    background: var(--surface);
    color: var(--text);
    font-family: inherit;
    transition: border-color 0.15s;
  }
  .field-input:focus { outline: none; border-color: var(--teal); }
  .btn-primary {
    width: 100%;
    padding: 11px;
    font-size: 14px;
    font-weight: 600;
    border: none;
    border-radius: var(--radius-sm);
    background: var(--text);
    color: #fff;
    transition: opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.82; }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .error-msg {
    font-size: 12px;
    color: var(--red);
    background: var(--red-bg);
    border: 0.5px solid #f09595;
    border-radius: var(--radius-sm);
    padding: 8px 10px;
    display: none;
  }
  .name-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    max-height: 260px;
    overflow-y: auto;
  }
  .name-btn {
    padding: 10px 8px;
    font-size: 13px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--surface2);
    color: var(--text);
    text-align: center;
    transition: all 0.12s;
  }
  .name-btn:hover { border-color: var(--border2); background: var(--surface); }
  .name-btn.selected {
    border: 2px solid var(--teal);
    background: var(--teal-bg);
    color: var(--teal);
    font-weight: 600;
  }
  .name-role { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .name-btn.selected .name-role { color: var(--teal); }

  /* =====================
     チャット画面
  ===================== */
  #screen-chat {
    height: 100vh;
    flex-direction: row;
  }

  /* サイドバー */
  .sidebar {
    width: 220px;
    flex-shrink: 0;
    background: var(--surface2);
    border-right: 0.5px solid var(--border);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  .sidebar-header {
    padding: 14px 14px 10px;
    border-bottom: 0.5px solid var(--border);
  }
  .sidebar-title { font-size: 13px; font-weight: 700; color: var(--text); }
  .sidebar-user {
    font-size: 11px;
    color: var(--text3);
    margin-top: 3px;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .sidebar-user-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--teal);
    flex-shrink: 0;
  }
  .case-list { flex: 1; overflow-y: auto; padding: 8px; }
  .case-item {
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    margin-bottom: 3px;
    border: 0.5px solid transparent;
    transition: all 0.12s;
  }
  .case-item:hover { background: var(--surface); }
  .case-item.active {
    background: var(--surface);
    border-color: var(--border2);
  }
  .case-item-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .case-item-meta { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .sidebar-footer { padding: 8px; border-top: 0.5px solid var(--border); display: flex; flex-direction: column; gap: 6px; }
  .sidebar-btn {
    width: 100%;
    padding: 8px 10px;
    font-size: 12px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2);
    background: transparent;
    color: var(--text2);
    text-align: left;
    transition: background 0.12s;
  }
  .sidebar-btn:hover { background: var(--surface); }
  .sidebar-btn.admin { color: var(--amber); border-color: var(--amber-bg); }

  /* メインエリア */
  .main { flex: 1; display: flex; flex-direction: column; height: 100vh; min-width: 0; }
  .main-header {
    padding: 12px 18px;
    border-bottom: 0.5px solid var(--border);
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .main-title { font-size: 14px; font-weight: 700; color: var(--text); flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .main-sub { font-size: 11px; color: var(--text3); }
  .tag-filters { display: flex; gap: 5px; flex-wrap: wrap; }
  .tag-filter-btn {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 99px;
    border: 0.5px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    transition: all 0.12s;
  }
  .tag-filter-btn:hover, .tag-filter-btn.active { border-color: var(--border2); background: var(--surface); }

  /* メッセージ一覧 */
  .messages { flex: 1; overflow-y: auto; padding: 16px 18px; display: flex; flex-direction: column; gap: 14px; }
  .no-case { display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text3); font-size: 13px; }

  /* メッセージ */
  .msg { display: flex; flex-direction: column; gap: 4px; }
  .msg-header { display: flex; align-items: center; gap: 7px; }
  .avatar {
    width: 26px; height: 26px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 700;
    flex-shrink: 0;
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    color: var(--text2);
  }
  .msg-name { font-size: 12px; font-weight: 600; color: var(--text2); }
  .msg-time { font-size: 10px; color: var(--text3); }
  .tag-badge {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 99px;
    font-weight: 600;
  }
  .tag-good { background: var(--teal-bg); color: var(--teal); border: 0.5px solid var(--teal-bd); }
  .tag-imp  { background: var(--coral-bg); color: var(--coral); border: 0.5px solid var(--coral-bd); }
  .tag-q    { background: var(--blue-bg); color: var(--blue); border: 0.5px solid var(--blue-bd); }
  .msg-body {
    font-size: 13px;
    color: var(--text);
    line-height: 1.65;
    margin-left: 33px;
    background: var(--surface2);
    padding: 8px 12px;
    border-radius: 0 var(--radius-sm) var(--radius-sm) var(--radius-sm);
    border: 0.5px solid var(--border);
  }
  .msg-actions {
    margin-left: 33px;
    margin-top: 3px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .act-btn {
    font-size: 11px;
    color: var(--text3);
    background: none;
    border: none;
    padding: 0;
    display: flex;
    align-items: center;
    gap: 3px;
    transition: color 0.12s;
  }
  .act-btn:hover { color: var(--text2); }

  /* リプライ */
  .replies-wrap {
    overflow: hidden;
    transition: max-height 0.25s ease, opacity 0.2s ease;
  }
  .replies-wrap.collapsed { max-height: 0 !important; opacity: 0; }
  .replies {
    margin-left: 33px;
    margin-top: 8px;
    border-left: 2px solid var(--border2);
    padding-left: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding-bottom: 4px;
  }
  .reply { display: flex; flex-direction: column; gap: 3px; }
  .reply-header { display: flex; align-items: center; gap: 6px; }
  .reply-avatar {
    width: 20px; height: 20px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700;
    flex-shrink: 0;
    background: var(--surface2);
    border: 0.5px solid var(--border2);
    color: var(--text2);
  }
  .reply-name { font-size: 11px; font-weight: 600; color: var(--text2); }
  .reply-time { font-size: 10px; color: var(--text3); }
  .reply-body {
    font-size: 12px;
    color: var(--text);
    line-height: 1.6;
    margin-left: 26px;
    background: var(--surface2);
    padding: 6px 10px;
    border-radius: 0 var(--radius-sm) var(--radius-sm) var(--radius-sm);
    border: 0.5px solid var(--border);
  }

  /* リプライ入力 */
  .reply-input-box {
    margin-left: 33px;
    margin-top: 6px;
    border-left: 2px solid var(--teal-bd);
    padding-left: 12px;
  }
  .reply-quote {
    font-size: 11px;
    color: var(--text3);
    margin-bottom: 5px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .reply-cancel-btn { background: none; border: none; font-size: 11px; color: var(--text3); padding: 0; }
  .reply-cancel-btn:hover { color: var(--text2); }
  .reply-row { display: flex; gap: 6px; align-items: flex-end; }
  .reply-ta {
    flex: 1;
    resize: none;
    height: 48px;
    font-size: 12px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 7px 9px;
    font-family: inherit;
    color: var(--text);
    background: var(--surface);
    line-height: 1.5;
  }
  .reply-ta:focus { outline: none; border-color: var(--teal); }
  .reply-send-btn {
    padding: 7px 12px;
    font-size: 12px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2);
    background: var(--surface);
    color: var(--text);
    height: 48px;
    white-space: nowrap;
    transition: background 0.12s;
  }
  .reply-send-btn:hover { background: var(--surface2); }

  /* 新規投稿エリア */
  .input-area {
    padding: 12px 18px;
    border-top: 0.5px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .input-controls { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .ctrl-label { font-size: 11px; color: var(--text3); }
  .tag-sel-btn {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 99px;
    border: 0.5px solid var(--border2);
    background: transparent;
    color: var(--text2);
    transition: all 0.12s;
  }
  .tag-sel-btn.sel-good { background: var(--teal-bg); border-color: var(--teal-bd); color: var(--teal); font-weight: 600; }
  .tag-sel-btn.sel-imp  { background: var(--coral-bg); border-color: var(--coral-bd); color: var(--coral); font-weight: 600; }
  .tag-sel-btn.sel-q    { background: var(--blue-bg); border-color: var(--blue-bd); color: var(--blue); font-weight: 600; }
  .anon-label { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text3); margin-left: auto; cursor: pointer; user-select: none; }
  .input-row { display: flex; gap: 8px; align-items: flex-end; }
  .msg-ta {
    flex: 1;
    resize: none;
    height: 54px;
    font-size: 13px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    padding: 8px 11px;
    font-family: inherit;
    color: var(--text);
    background: var(--surface);
    line-height: 1.5;
  }
  .msg-ta:focus { outline: none; border-color: var(--teal); }
  .send-btn {
    padding: 9px 16px;
    font-size: 13px;
    font-weight: 600;
    border-radius: var(--radius-sm);
    border: none;
    background: var(--text);
    color: #fff;
    height: 54px;
    transition: opacity 0.12s;
  }
  .send-btn:hover { opacity: 0.82; }

  /* =====================
     管理者画面
  ===================== */
  #screen-admin {
    min-height: 100vh;
    flex-direction: column;
    background: var(--bg);
  }
  .admin-topbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 20px;
    background: var(--surface);
    border-bottom: 0.5px solid var(--border2);
  }
  .admin-topbar-title { font-size: 14px; font-weight: 700; color: var(--text); }
  .admin-badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 99px;
    background: var(--amber-bg);
    color: var(--amber);
    font-weight: 600;
  }
  .admin-back {
    font-size: 12px;
    color: var(--text3);
    background: none;
    border: none;
    margin-left: auto;
    transition: color 0.12s;
  }
  .admin-back:hover { color: var(--text2); }
  .admin-content {
    display: grid;
    grid-template-columns: 1fr 300px;
    gap: 0;
    flex: 1;
    max-width: 900px;
    width: 100%;
    margin: 24px auto;
    padding: 0 20px;
    align-items: start;
  }
  .admin-panel {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .admin-panel-header {
    padding: 12px 16px;
    border-bottom: 0.5px solid var(--border);
    font-size: 12px;
    font-weight: 700;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .member-table { width: 100%; border-collapse: collapse; }
  .member-table th {
    font-size: 11px;
    color: var(--text3);
    text-align: left;
    padding: 8px 16px;
    border-bottom: 0.5px solid var(--border);
    font-weight: 600;
  }
  .member-table td {
    font-size: 13px;
    padding: 10px 16px;
    border-bottom: 0.5px solid var(--border);
    color: var(--text);
    vertical-align: middle;
  }
  .member-table tr:last-child td { border-bottom: none; }
  .role-pill { font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: 600; }
  .role-leader { background: var(--purple-bg); color: var(--purple); }
  .role-qs     { background: var(--teal-bg);   color: var(--teal);   }
  .role-member { background: var(--surface2);  color: var(--text2);  }
  .del-btn {
    font-size: 11px;
    color: var(--red);
    background: none;
    border: 0.5px solid #f09595;
    border-radius: var(--radius-sm);
    padding: 3px 8px;
    transition: background 0.12s;
  }
  .del-btn:hover { background: var(--red-bg); }
  .admin-side { display: flex; flex-direction: column; gap: 12px; margin-left: 14px; }
  .admin-card {
    background: var(--surface);
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .admin-card-title {
    font-size: 12px;
    font-weight: 700;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .admin-field { display: flex; flex-direction: column; gap: 5px; }
  .admin-field label { font-size: 11px; color: var(--text3); }
  .admin-field select {
    font-size: 13px;
    padding: 8px 10px;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius-sm);
    font-family: inherit;
    color: var(--text);
    background: var(--surface);
    width: 100%;
  }
  .admin-add-btn {
    width: 100%;
    padding: 9px;
    font-size: 13px;
    font-weight: 600;
    border: none;
    border-radius: var(--radius-sm);
    background: var(--text);
    color: #fff;
    transition: opacity 0.12s;
  }
  .admin-add-btn:hover { opacity: 0.82; }
  .pw-row { display: flex; gap: 6px; }
  .pw-row .field-input { flex: 1; font-size: 12px; padding: 7px 9px; }
  .pw-update-btn {
    font-size: 12px;
    padding: 7px 10px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    white-space: nowrap;
    transition: background 0.12s;
  }
  .pw-update-btn:hover { background: var(--surface); }
  .success-msg {
    font-size: 11px;
    color: var(--teal);
    background: var(--teal-bg);
    border-radius: var(--radius-sm);
    padding: 5px 8px;
    display: none;
  }

  /* =====================
     モーダル（症例作成）
  ===================== */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.38);
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 1.6rem;
    width: 100%;
    max-width: 400px;
    border: 0.5px solid var(--border2);
  }
  .modal-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 1.2rem; }
  .modal-fields { display: flex; flex-direction: column; gap: 12px; margin-bottom: 1.2rem; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-cancel {
    padding: 9px 16px;
    font-size: 13px;
    border-radius: var(--radius-sm);
    border: 0.5px solid var(--border2);
    background: var(--surface2);
    color: var(--text2);
    transition: background 0.12s;
  }
  .btn-cancel:hover { background: var(--surface); }

  /* スクロールバー */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>
<body>

<!-- ===================== ログイン画面 ===================== -->
<div id="screen-login" class="screen active">
  <div class="login-card">
    <div class="login-logo">救急振り返りルーム</div>
    <div class="login-sub">署内スタッフ専用システム</div>

    <!-- Step1: 合言葉 -->
    <div class="login-step" id="step1">
      <div>
        <div class="field-label">合言葉</div>
        <input class="field-input" type="password" id="pw-input" placeholder="合言葉を入力...">
      </div>
      <div class="error-msg" id="pw-error">合言葉が違います</div>
      <button class="btn-primary" onclick="submitPassphrase()">次へ</button>
    </div>

    <!-- Step2: 名前選択 -->
    <div class="login-step hidden" id="step2">
      <div id="admin-direct-wrap" class="hidden">
        <div style="font-size:12px;color:var(--text2);background:var(--amber-bg);border:0.5px solid #fac775;border-radius:var(--radius-sm);padding:10px 12px;line-height:1.6;">
          管理者合言葉で認証されました。<br>名前を選ばずに管理者画面へ入ることもできます。
        </div>
        <button class="btn-primary" style="background:var(--amber);" onclick="enterAdminDirect()">管理者画面へ入る</button>
        <div style="font-size:11px;color:var(--text3);text-align:center;">または下から名前を選んでチャットに参加</div>
      </div>
      <div>
        <div class="field-label">あなたの名前を選択</div>
        <div class="name-grid" id="name-grid">
          <div style="font-size:12px;color:var(--text3);padding:8px;grid-column:span 2">読み込み中...</div>

<div class="modal-overlay" id="modal-new-case">

<script>
/* ==================================================
   設定（自分のSupabase情報に書き換えてください）
================================================== */
const SUPABASE_URL = 'https://furhbsojbomwazispcrr.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ1cmhic29qYm9td2F6aXNwY3JyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwMDA2NTIsImV4cCI6MjA4OTU3NjY1Mn0.7JcJjhgRCr7sXu2f2PoST8VJn14BQ7HH5YwkeUfeFi0';

/* ==================================================
   Supabase初期化
================================================== */
const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ==================================================
   状態管理
================================================== */
let currentUser = null;   // { id, display_name, role, is_admin }
let currentCase = null;   // { id, title, occurred_at, ... }
let currentTag  = 'なし';
let filterTagVal = 'all';
let realtimeChannel = null;

/* ==================================================
   初期化
================================================== */
window.addEventListener('DOMContentLoaded', async () => {
  const saved = localStorage.getItem('kyukyu_user');
  if (saved) {
    currentUser = JSON.parse(saved);
    await startChat();
  }
  document.getElementById('pw-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitPassphrase();
  });
});

/* ==================================================
   ログイン
================================================== */
async function submitPassphrase() {
  const input = document.getElementById('pw-input').value.trim();
  const errEl = document.getElementById('pw-error');
  errEl.style.display = 'none';

  // Supabaseから合言葉を取得して照合
  const { data, error } = await db.from('settings').select('key,value');
  if (error || !data) { errEl.textContent = 'サーバーに接続できません'; errEl.style.display = 'block'; return; }

  const settings = Object.fromEntries(data.map(r => [r.key, r.value]));
  const isAdmin   = input === settings['passphrase_admin'];
  const isGeneral = input === settings['passphrase_general'];

  if (!isAdmin && !isGeneral) {
    errEl.textContent = '合言葉が違います';
    errEl.style.display = 'block';
    return;
  }

  // 隊員一覧を取得
  const { data: members } = await db.from('members').select('*').order('role').order('display_name');
  const grid = document.getElementById('name-grid');
  grid.innerHTML = '';
  (members || []).forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'name-btn';
    btn.dataset.id   = m.id;
    btn.dataset.name = m.display_name;
    btn.dataset.role = m.role;
    btn.dataset.admin = isAdmin ? '1' : '0';
    btn.innerHTML = `${m.display_name}<div class="name-role">${m.role}</div>`;
    btn.onclick = () => selectMember(btn);
    grid.appendChild(btn);
  });

  if (isAdmin) {
    document.getElementById('admin-direct-wrap').classList.remove('hidden');
  }

  document.getElementById('step1').classList.add('hidden');
  document.getElementById('step2').classList.remove('hidden');
}

function selectMember(btn) {
  document.querySelectorAll('.name-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('enter-btn').disabled = false;
}

async function enterChat() {
  const selected = document.querySelector('.name-btn.selected');
  if (!selected) return;
  currentUser = {
    id:           selected.dataset.id,
    display_name: selected.dataset.name,
    role:         selected.dataset.role,
    is_admin:     selected.dataset.admin === '1'
  };
  localStorage.setItem('kyukyu_user', JSON.stringify(currentUser));
  await startChat();
}

async function enterAdminDirect() {
  currentUser = {
    id:           'admin',
    display_name: '管理者',
    role:         '管理者',
    is_admin:     true
  };
  localStorage.setItem('kyukyu_user', JSON.stringify(currentUser));
  showScreen('admin');
  await loadAdminMembers();
}

async function startChat() {
  showScreen('chat');
  document.getElementById('sidebar-username').textContent =
    `${currentUser.display_name}（${currentUser.role}）`;
  document.getElementById('admin-btn').style.display =
    currentUser.is_admin ? '' : 'none';
  await loadCases();
}

function logout() {
  localStorage.removeItem('kyukyu_user');
  currentUser = null;
  currentCase = null;
  if (realtimeChannel) db.removeChannel(realtimeChannel);
  document.getElementById('pw-input').value = '';
  document.getElementById('step1').classList.remove('hidden');
  document.getElementById('step2').classList.add('hidden');
  document.getElementById('name-grid').innerHTML = '';
  document.getElementById('enter-btn').disabled = true;
  document.getElementById('admin-direct-wrap').classList.add('hidden');
  showScreen('login');
}

/* ==================================================
   症例
================================================== */
async function loadCases() {
  const { data } = await db.from('cases').select('*').order('occurred_at', { ascending: false });
  const list = document.getElementById('case-list');
  list.innerHTML = '';
  if (!data || data.length === 0) {
    list.innerHTML = '<div style="font-size:12px;color:var(--text3);padding:8px;">症例がありません</div>';
    return;
  }
  data.forEach(c => {
    const el = document.createElement('div');
    el.className = 'case-item';
    el.dataset.id = c.id;
    el.innerHTML = `<div class="case-item-title">${esc(c.title)}</div><div class="case-item-meta">${c.occurred_at || ''}</div>`;
    el.onclick = () => selectCase(c);
    list.appendChild(el);
  });
}

async function selectCase(c) {
  currentCase = c;
  document.querySelectorAll('.case-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === c.id);
  });
  document.getElementById('main-header').style.display = '';
  document.getElementById('input-area').style.display  = '';
  document.getElementById('main-title').textContent = c.title;
  document.getElementById('main-sub').textContent   = c.occurred_at || '';
  filterTagVal = 'all';
  document.querySelectorAll('.tag-filter-btn').forEach(b => b.classList.toggle('active', b.dataset.tag === 'all'));
  await loadMessages();
  subscribeRealtime();
}

function openNewCaseModal() {
  document.getElementById('case-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('modal-new-case').classList.add('active');
}
function closeNewCaseModal() {
  document.getElementById('modal-new-case').classList.remove('active');
}

async function createCase() {
  const title   = document.getElementById('case-title').value.trim();
  const date    = document.getElementById('case-date').value;
  const summary = document.getElementById('case-summary').value.trim();
  if (!title) return;
  const { data, error } = await db.from('cases').insert({
    title, occurred_at: date || null,
    patient_summary: summary || null,
    created_by: currentUser.display_name
  }).select().single();
  if (!error && data) {
    closeNewCaseModal();
    document.getElementById('case-title').value   = '';
    document.getElementById('case-summary').value = '';
    await loadCases();
    selectCase(data);
  }
}

/* ==================================================
   メッセージ
================================================== */
async function loadMessages() {
  const { data } = await db.from('messages')
    .select('*')
    .eq('case_id', currentCase.id)
    .order('created_at');

  const container = document.getElementById('messages');
  container.innerHTML = '';

  // 親メッセージだけ抽出
  const parents  = (data || []).filter(m => !m.parent_id);
  const children = (data || []).filter(m =>  m.parent_id);

  if (parents.length === 0) {
    container.innerHTML = '<div class="no-case">まだ投稿がありません</div>';
    return;
  }

  parents.forEach(msg => {
    if (filterTagVal !== 'all' && msg.tag !== filterTagVal) return;
    const replies = children.filter(r => r.parent_id === msg.id);
    container.appendChild(buildMsgEl(msg, replies));
  });
  container.scrollTop = container.scrollHeight;
}

function buildMsgEl(msg, replies = []) {
  const div = document.createElement('div');
  div.className = 'msg';
  div.dataset.id = msg.id;
  const name    = msg.is_anonymous ? '匿名' : esc(msg.display_name);
  const initial = name.charAt(0);
  const tagHTML = msg.tag && msg.tag !== 'なし'
    ? `<span class="tag-badge ${tagClass(msg.tag)}">${esc(msg.tag)}</span>` : '';

  let repliesHTML = '';
  if (replies.length > 0) {
    repliesHTML = `
      <div class="replies-wrap" id="rw-${msg.id}" style="max-height:${replies.length * 80}px;">
        <div class="replies">${replies.map(r => buildReplyHTML(r)).join('')}</div>
      </div>`;
  }

  const toggleHTML = replies.length > 0 ? `
    <button class="act-btn" onclick="toggleReplies('${msg.id}',${replies.length})">
      <span id="ri-${msg.id}">▶</span>
      <span id="rl-${msg.id}">リプライ ${replies.length}件を非表示</span>
    </button>` : '';

  div.innerHTML = `
    <div class="msg-header">
      <div class="avatar">${initial}</div>
      <span class="msg-name">${name}</span>
      <span class="msg-time">${formatTime(msg.created_at)}</span>
      ${tagHTML}
    </div>
    <div class="msg-body">${esc(msg.body)}</div>
    <div class="msg-actions">
      <button class="act-btn" onclick="openReplyInput('${msg.id}','${name}')">↩ リプライ</button>
      ${toggleHTML}
    </div>
    ${repliesHTML}`;
  return div;
}

function buildReplyHTML(r) {
  const name    = r.is_anonymous ? '匿名' : esc(r.display_name);
  const initial = name.charAt(0);
  return `
    <div class="reply" data-id="${r.id}">
      <div class="reply-header">
        <div class="reply-avatar">${initial}</div>
        <span class="reply-name">${name}</span>
        <span class="reply-time">${formatTime(r.created_at)}</span>
      </div>
      <div class="reply-body">${esc(r.body)}</div>
    </div>`;
}

/* ==================================================
   リプライ 表示/非表示
================================================== */
function toggleReplies(msgId, count) {
  const wrap  = document.getElementById('rw-' + msgId);
  const icon  = document.getElementById('ri-' + msgId);
  const label = document.getElementById('rl-' + msgId);
  if (!wrap) return;
  const isOpen = !wrap.classList.contains('collapsed');
  if (isOpen) {
    wrap.style.maxHeight = wrap.scrollHeight + 'px';
    requestAnimationFrame(() => {
      wrap.style.maxHeight = '0';
      wrap.classList.add('collapsed');
    });
    icon.textContent  = '▶';
    label.textContent = `リプライ ${count}件を表示`;
  } else {
    wrap.classList.remove('collapsed');
    wrap.style.maxHeight = wrap.scrollHeight + 400 + 'px';
    icon.textContent  = '▼';
    label.textContent = `リプライ ${count}件を非表示`;
  }
}

/* ==================================================
   リプライ入力
================================================== */
function openReplyInput(parentId, toName) {
  // 同じ親の既存入力欄を閉じる
  document.querySelectorAll('.reply-input-box').forEach(el => el.remove());

  const msgEl = document.querySelector(`.msg[data-id="${parentId}"]`);
  if (!msgEl) return;

  // リプライが折りたたまれていたら開く
  const wrap = document.getElementById('rw-' + parentId);
  const rl   = document.getElementById('rl-' + parentId);
  if (wrap && wrap.classList.contains('collapsed') && rl) {
    const count = parseInt(rl.textContent.match(/\d+/) || [0]) || 0;
    toggleReplies(parentId, count);
  }

  const box = document.createElement('div');
  box.className = 'reply-input-box';
  box.innerHTML = `
    <div class="reply-quote">
      <span>${toName}へのリプライ</span>
      <button class="reply-cancel-btn" onclick="this.closest('.reply-input-box').remove()">× キャンセル</button>
    </div>
    <div class="reply-row">
      <textarea class="reply-ta" placeholder="リプライを入力..."></textarea>
      <button class="reply-send-btn" onclick="sendReply(this,'${parentId}')">送信</button>
    </div>`;

  if (wrap) wrap.after(box);
  else msgEl.querySelector('.msg-actions').after(box);
  box.querySelector('textarea').focus();

  if (wrap) wrap.style.maxHeight = wrap.scrollHeight + 200 + 'px';
}

async function sendReply(btn, parentId) {
  const ta   = btn.closest('.reply-input-box').querySelector('textarea');
  const body = ta.value.trim();
  if (!body) return;
  const isAnon = document.getElementById('anon-check').checked;
  await db.from('messages').insert({
    case_id:      currentCase.id,
    parent_id:    parentId,
    display_name: currentUser.display_name,
    role:         currentUser.role,
    body,
    tag:          null,
    is_anonymous: isAnon
  });
  btn.closest('.reply-input-box').remove();
  await loadMessages();
}

/* ==================================================
   新規メッセージ送信
================================================== */
function selectTag(btn) {
  document.querySelectorAll('.tag-sel-btn').forEach(b => b.className = 'tag-sel-btn');
  currentTag = btn.dataset.tag;
  const cls = { '良かった点': 'sel-good', '改善点': 'sel-imp', '質問': 'sel-q' }[currentTag] || '';
  if (cls) btn.classList.add(cls);
}

async function sendMessage() {
  const ta   = document.getElementById('msg-input');
  const body = ta.value.trim();
  if (!body || !currentCase) return;
  const isAnon = document.getElementById('anon-check').checked;
  await db.from('messages').insert({
    case_id:      currentCase.id,
    parent_id:    null,
    display_name: currentUser.display_name,
    role:         currentUser.role,
    body,
    tag:          currentTag === 'なし' ? null : currentTag,
    is_anonymous: isAnon
  });
  ta.value = '';
  await loadMessages();
}

/* ==================================================
   タグフィルター
================================================== */
function filterTag(btn) {
  filterTagVal = btn.dataset.tag;
  document.querySelectorAll('.tag-filter-btn').forEach(b => b.classList.toggle('active', b === btn));
  loadMessages();
}

/* ==================================================
   Realtime購読
================================================== */
function subscribeRealtime() {
  if (realtimeChannel) db.removeChannel(realtimeChannel);
  realtimeChannel = db.channel('messages-' + currentCase.id)
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'messages',
      filter: `case_id=eq.${currentCase.id}`
    }, () => loadMessages())
    .subscribe();
}

/* ==================================================
   管理者画面
================================================== */
async function goAdmin() {
  showScreen('admin');
  await loadAdminMembers();
}
function goChat() { showScreen('chat'); }

async function loadAdminMembers() {
  const { data } = await db.from('members').select('*').order('role').order('display_name');
  const tbody = document.getElementById('admin-member-tbody');
  tbody.innerHTML = '';
  (data || []).forEach(m => {
    const tr = document.createElement('tr');
    const pillCls = { '隊長': 'role-leader', '救命士': 'role-qs' }[m.role] || 'role-member';
    tr.innerHTML = `
      <td>${esc(m.display_name)}</td>
      <td><span class="role-pill ${pillCls}">${esc(m.role)}</span></td>
      <td><button class="del-btn" onclick="deleteMember('${m.id}','${esc(m.display_name)}')">削除</button></td>`;
    tbody.appendChild(tr);
  });
}

async function addMember() {
  const name = document.getElementById('new-member-name').value.trim();
  const role = document.getElementById('new-member-role').value;
  if (!name) return;
  await db.from('members').insert({ display_name: name, role });
  document.getElementById('new-member-name').value = '';
  showSuccess('member-success');
  await loadAdminMembers();
}

async function deleteMember(id, name) {
  if (!confirm(`「${name}」を削除しますか？`)) return;
  await db.from('members').delete().eq('id', id);
  await loadAdminMembers();
}

async function updatePassphrase(key, inputId) {
  const val = document.getElementById(inputId).value.trim();
  if (!val) return;
  await db.from('settings').upsert({ key, value: val });
  document.getElementById(inputId).value = '';
  showSuccess('pw-success');
}

/* ==================================================
   ユーティリティ
================================================== */
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
}

function tagClass(tag) {
  return { '良かった点': 'tag-good', '改善点': 'tag-imp', '質問': 'tag-q' }[tag] || '';
}

function formatTime(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function esc(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function showSuccess(id) {
  const el = document.getElementById(id);
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 2500);
}
</script>
